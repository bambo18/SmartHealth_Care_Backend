spring.application.name=backend

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.security=DEBUG

jwt.secret=${JWT_SECRET}
jwt.accessExpirationInMinutes=15
jwt.refreshExpirationInDays=7

# 스키마 자동 생성 설정 (개발 환경에서만 사용 권장)
# spring.jpa.generate-ddl=true

# 스키마를 SQL 파일로 내보내기 설정 (필요시 사용)
# spring.jpa.properties.javax.persistence.schema-generation.scripts.action=create
# spring.jpa.properties.javax.persistence.schema-generation.scripts.create-target=src/main/resources/schema.sql

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.flyway.user=postgres
spring.flyway.password=${DB_PASSWORD}
spring.flyway.baseline-on-migrate=true