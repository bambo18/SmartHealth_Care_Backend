spring.application.name=backend

spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD}
spring.datasource.driver-class-name=org.postgresql.Driver

# Hibernate Configuration
spring.jpa.hibernate.ddl-auto=none 
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect

logging.level.org.springframework.security=DEBUG

jwt.secret=${JWT_SECRET}
jwt.access-token.expiration.minutes=15
jwt.refresh-token.expiration.days=7
jwt.refresh-token.max-count=10

# 스키마 자동 생성 설정 (개발 환경에서만 사용 권장)
# spring.jpa.generate-ddl=true

# 스키마를 SQL 파일로 내보내기 설정 (필요시 사용)
# spring.jpa.properties.javax.persistence.schema-generation.scripts.action=create
# spring.jpa.properties.javax.persistence.schema-generation.scripts.create-target=src/main/resources/schema.sql

# Flyway configuration
spring.flyway.enabled=true
spring.flyway.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.flyway.user=postgres
spring.flyway.password=${DB_PASSWORD}
spring.flyway.baseline-on-migrate=true

# Email configuration
spring.mail.host=${SMTP_HOST}
spring.mail.username=${SMTP_USER}
spring.mail.password=${SMTP_PASSWORD}
spring.mail.properties.mail.transport.protocol=smtp
spring.mail.properties.mail.smtp.port=25
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true

app.mail.from=${SMTP_FROM}

app.token.email-verification.secret=${EMAIL_VERIFICATION_SECRET}

# Token expiration settings
# 이메일 인증 시도 최대 횟수
app.token.email-verification.tries.count=5
# 이메일 인증 시도 최대 횟수 제한 기간
app.token.email-verification.tries.duration.days=1
# 이메일 인증 토큰 당 실패 시도 최대 횟수
app.token.email-verification.failure.attempts=5
# 이메일 인증 토큰 당 최대 실패 후 잠금 기간 (분)
app.token.email-verification.lock.duration.minutes=30
# 이메일 인증 토큰 만료 시간 (분)
app.token.email-verification.expiration.minutes=15
app.token.password-reset.expiration.minutes=15